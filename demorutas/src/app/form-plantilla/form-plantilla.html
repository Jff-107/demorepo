<form #miForm="ngForm" (ngSubmit)="onEnviar(miForm)">
<div><label for="nombre">Nombre</label>
<input type="text" id="nombre" name="nombre" ngModel required>
</div> <div><label for="email">Email</label>
<input type="email" id="email" name="email" ngModel required>  </div>
<div>
<label for="edad">Edad</label>
<input id="edad" name="edad" ngModel required type="number" min="18" #edad="ngModel">  </div>
<div *ngIf="edad && edad.invalid && edad.touched">
 <div *ngIf="edad.errors?.['required']">Edad es obligatorio</div>
 <div *ngIf="edad.errors?.['min']">Minimo no válido</div>
</div>
<button type="submit" [disabled]="miForm.invalid">Enviar</button> 
</form>
